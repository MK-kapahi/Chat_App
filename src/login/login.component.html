<div class="conatiner">
    <div class="heading">
        <h4></h4>
    </div>
    <div class="loginFormDisplay">
        <form [formGroup]="loginForm" (ngSubmit)="loginUser()">
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" formControlName="email">
                <label for="floatingInput">Email address</label>
              </div>
              <div class="form-floating">
                <input type="password" class="form-control" id="floatingPassword" placeholder="Password" formControlName="pass">
                <label for="floatingPassword">Password</label>
              </div>

              <div>
                <button type="submit" class="btn btn-primary">Submit</button>

              </div>
              <div class="">
                <button type="button" class="btn btn-light" (click)="showModal()">forgotPassword?</button>
 
              </div>
        </form>
    </div>
</div>

<div class="modal fade"  * data-bs-backdrop="static"  tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="staticBackdropLabel">Modal title</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <h3> Heyy welcome to Modal </h3>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="button" class="btn btn-primary">Understood</button>
        </div>
      </div>
    </div>
  </div>
