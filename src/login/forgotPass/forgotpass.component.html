<div class="modal-header">
    <h5 class="modal-title" id="exampleModalLabel"></h5>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modalRef.close()"
    ></button>
  </div>
  <div class="modal-body">...</div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="modalRef.close()">
      <!-- <form #emailform = "ngForm">
        <label for="emailEnter"> Enter Your Email </label>
        <input type="text" id="emailEnter" [(ngModel)]="emailForm.email" > 
      </form> -->
    </button>
    <button type="button" class="btn btn-primary">Save changes</button>
  </div>
  <div class="modal-body">
  <div class="modal-footer">
    <form #emailForm = "ngForm" (ngSubmit)="onSubmit(emailForm)">
      <label for="emailEnter"> Enter Your Email </label>
      <input type="text" id="emailEnter" name="email" ngModel> 
      <button type="submit" class="btn btn-primary">Send Link </button>
    </form>

     <button type="button" class="btn btn-secondary" (click)="modalRef.close()">Close
    </button>
  </div>
</div>
